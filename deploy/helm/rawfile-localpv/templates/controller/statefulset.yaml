apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "rawfile-localpv.fullname" . }}-controller
spec:
  replicas: 1
  serviceName: {{ include "rawfile-localpv.fullname" . }}
  selector:
    matchLabels: &selectorLabels
      {{- include "rawfile-localpv.selectorLabels" . | nindent 6 }}
      component: controller
  template:
    metadata:
      labels: *selectorLabels
    spec:
      serviceAccount: {{ include "rawfile-localpv.fullname" . }}-driver
      priorityClassName: {{ .Values.controller.priorityClassName }}
      tolerations:
        {{- .Values.controller.tolerations | toYaml | nindent 8 }}
      volumes:
        - name: socket-dir
          emptyDir: {}
      containers:
        - name: csi-driver
          image: "{{ include "rawfile-localpv.controller-image" . }}"
          imagePullPolicy: "{{ include "rawfile-localpv.controller-pull-policy" . }}"
          args:
            - csi-driver
            - --disable-metrics
          env:
            - name: PROVISIONER_NAME
              value: "{{ .Values.provisionerName }}"
            - name: CSI_ENDPOINT
              value: unix:///csi/csi.sock
            - name: NODE_DATADIR
              value: "{{ .Values.node.dataDirPath }}"
            - name: IMAGE_REGISTRY
              value: "{{ include "rawfile-localpv.node-image-registry" . }}"
            - name: IMAGE_REPOSITORY
              value: "{{ include "rawfile-localpv.controller-image-repository" . }}"
            - name: IMAGE_TAG
              value: "{{ include "rawfile-localpv.controller-image-tag" . }}"
            - name: NAMESPACE
              value: {{ .Release.Namespace }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel }}
            - name: LOG_FORMAT
              value: {{ .Values.logFormat }}
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
          ports:
            - name: csi-probe
              containerPort: 9808
          resources:
            {{- include "rawfile-localpv.controller-resources" . | nindent 12 }}
        - name: external-resizer
          image: {{ printf "%s/%s:%s" (.Values.controller.externalResizer.image.registry | default .Values.global.k8sImageRegistry) .Values.controller.externalResizer.image.repository .Values.controller.externalResizer.image.tag }}
          imagePullPolicy: IfNotPresent
          args:
            - "--csi-address=$(ADDRESS)"
            - "--handle-volume-inuse-error=false"
          env:
            - name: ADDRESS
              value: /csi/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /csi

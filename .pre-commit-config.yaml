repos:
  - repo: local
    hooks:
      - id: version-sync
        name: Rawfile version
        entry: bash -c './.pre-commit.sh --version-sync'
        language: system
        files: ^(pyproject.toml|deploy/helm/rawfile-localpv/Chart.yaml)
        types: [file]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.3
    hooks:
      - id: ruff
        args: [ --fix ]
        exclude: rawfile/csi/
      - id: ruff-format
        exclude: rawfile/csi/
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
        exclude: |
          (?x)^(
            deploy/.*|
            rawfile/templates/.*
          )$
      - id: end-of-file-fixer
        exclude: ^(rawfile/csi/|deploy/helm/.*/README.*|deploy/rawfile-csi-driver.yaml)
      - id: trailing-whitespace
        exclude: deploy/rawfile-csi-driver.yaml
  - repo: https://github.com/norwoodj/helm-docs
    rev: "v1.14.2"
    hooks:
      - id: helm-docs-built
        args:
          - --chart-search-root=deploy/helm
          - --skip-version-footer
